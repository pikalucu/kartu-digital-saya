<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo"><i class="fa-solid fa-house"></i></a>
        <nav>
            <a href="about.html">About me</a>
            <a href="skills.html">Skills</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="contact.html" class="btn-contact">CONTACT ME</a>
        </nav>
    </header>

    <main>
        <div class="left-col">
            <h2 class="section-title">Contact Me</h2>
            <p class="desc">
                Silakan isi form di sebelah kanan untuk menghubungi saya.<br>
                Saya akan membalas pesan Anda secepat mungkin.
            </p>
        </div>

        <div class="right-col">
            <div class="contact-wrapper">
                <h3>SEND MESSAGE</h3>
                <form class="contact-form">
                    <input type="text" placeholder="Enter your name*" required>
                    <input type="email" placeholder="Enter your email*" required>
                    <input type="text" placeholder="Phone number">
                    <textarea placeholder="Your message*" required></textarea>
                    <button type="submit" class="btn-submit">SUBMIT</button>
                </form>
            </div>
        </div>
    </main>

</body>
</html>
